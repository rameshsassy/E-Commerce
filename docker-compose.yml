version: '3.8'

services:
  # 1. MongoDB Service
  mongo:
    image: mongo:7.0
    container_name: aashansh_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ecom_network

  # 2. Express Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aashansh_backend
    restart: always
    # Enable hot reloading in container dev using nodemon
    command: npx nodemon server.js
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    environment:
      # Use local mongo service container on the docker network.
      # Comment out MONGO_URI line below to fall back to the Atlas connection string in your .env file.
      - MONGO_URI=mongodb://mongo:27017/aashansh
      - PORT=5000
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - ecom_network

  # 3. Customer React Client
  customer:
    build:
      context: ./ecommerce_frontend/costumer
      dockerfile: Dockerfile
    container_name: aashansh_customer
    restart: always
    ports:
      - "5174:5174"
    volumes:
      - ./ecommerce_frontend/costumer:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - ecom_network

  # 4. Seller React Client
  seller:
    build:
      context: ./ecommerce_frontend/seller
      dockerfile: Dockerfile
    container_name: aashansh_seller
    restart: always
    ports:
      - "5175:5175"
    volumes:
      - ./ecommerce_frontend/seller:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - ecom_network

  # 5. Admin React Client
  admin:
    build:
      context: ./ecommerce_frontend/admin
      dockerfile: Dockerfile
    container_name: aashansh_admin
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./ecommerce_frontend/admin:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - ecom_network

volumes:
  mongo_data:
  uploads_data:

networks:
  ecom_network:
    driver: bridge
