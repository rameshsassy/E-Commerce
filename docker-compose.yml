version: '3.8'

services:
  # 1. MongoDB Service
  mongo:
    image: mongo:7.0
    container_name: aashansh_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ecom_network

  # 2. Express Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aashansh_backend
    restart: always
    # Enable hot reloading in container dev using nodemon
    command: npx nodemon server.js
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    environment:
      # Use local mongo service container on the docker network.
      # Comment out MONGO_URI line below to fall back to the Atlas connection string in your .env file.
      - MONGO_URI=mongodb://mongo:27017/aashansh
      - PORT=5000
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - ecom_network

  # 3. React Frontend Service
  frontend:
    build:
      context: ./ecommerce_frontend/frontend
      dockerfile: Dockerfile
    container_name: aashansh_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./ecommerce_frontend/frontend:/app
      - /app/node_modules
    environment:
      # Tell Vite's dev proxy to forward /api and /uploads to the backend service container
      - VITE_API_PROXY_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - ecom_network

volumes:
  mongo_data:
  uploads_data:

networks:
  ecom_network:
    driver: bridge
