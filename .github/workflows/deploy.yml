name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}
            echo "=== System Disk Space ==="
            df -h
            echo "=== Docker Containers ==="
            docker ps -a
            echo "=== Docker Disk Usage ==="
            docker system df
            echo "=== Container Logs (Backend) ==="
            docker compose logs backend --tail 100
            echo "=== Container Logs (Customer) ==="
            docker compose logs customer --tail 100
            echo "=== Container Logs (Seller) ==="
            docker compose logs seller --tail 100
            echo "=== Container Logs (Admin) ==="
            docker compose logs admin --tail 100